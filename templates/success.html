<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Smart Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="app-bg">
    <div class="app-shell center-content">
        <div class="hero-section">
            <div class="success-icon">OK</div>
            <h1 class="top-title">Checkout Requested</h1>
            <p class="section-subtitle">A cashier will complete your session.</p>
        </div>

        <div class="content">
            <div class="instruction-card">
                <p>Please show your <strong>Cart #{{ cart_label }}</strong> to the cashier and wait for approval before leaving.</p>
                <p id="approval-status">Waiting for cashier approval...</p>
            </div>
        </div>
    </div>
    <script>
        const cartLabel = "{{ cart_label }}";

        async function pollApproval() {
            if (!cartLabel) return;

            try {
                const response = await fetch(`/api/hardware_state/${encodeURIComponent(cartLabel)}`);
                const data = await response.json();

                if (data.status === "idle") {
                    window.location.href = "/";
                    return;
                }

                const statusEl = document.getElementById("approval-status");
                if (statusEl) {
                    statusEl.textContent = "Waiting for cashier approval...";
                }
            } catch (_) {}
        }

        pollApproval();
        setInterval(pollApproval, 2000);
    </script>
</body>
</html>
