<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .add-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn:hover { background: #dc2626; }
        
        /* Layout Fixes */
        .app-shell { max-width: 1200px !important; width: 95%; } /* Increased width for more space */
        
        .admin-table { width: 100%; border-collapse: collapse; table-layout: auto; }
        
        /* Column Specific Sizing */
        .col-name { min-width: 200px; }
        .col-barcode { min-width: 150px; }
        
        .admin-table input {
            width: 100%;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .admin-table input:disabled {
            background: transparent;
            border: none;
            color: #333;
            cursor: default;
            font-weight: inherit;
            text-overflow: ellipsis; /* Adds ... if name is still too long */
            white-space: nowrap;
            overflow: hidden;
        }
        
        .admin-table input:enabled {
            border: 1px solid #cbd5e1;
            background: white;
            padding: 6px;
            border-radius: 4px;
        }

        .save-btn { background: #22c55e; color: white; display: none; }
        .barcode-field { font-family: monospace; color: #475569; }
        .name-field { font-weight: bold; }
        
        /* Action buttons alignment */
        .action-cell { display: flex; gap: 5px; white-space: nowrap; }
    </style>
</head>
<body class="app-bg">
    <div class="app-shell"> 
        <header class="top-bar">
            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <h1 class="top-title">Inventory Management</h1>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button style="background-color: #0f766e; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;" onclick="window.location.href='/admin/change-password'">Change Password</button>
                    <button style="background-color: #4f46e5; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;" onclick="window.location.href='/cashier/dashboard'">Switch to Cashier</button>
                    <span class="top-badge" style="background: #ef4444; color: white;">Inventory</span>
                </div>
            </div>
        </header>

        <div class="content">
            <div class="add-box">
                <h3>+ Add New Product</h3>
                <div class="form-row">
                    <input type="text" id="new-name" placeholder="Product Name" class="admin-input" style="flex: 2;">
                    <input type="text" id="new-barcode" placeholder="Barcode" class="admin-input" style="flex: 1.5;">
                    <input type="number" id="new-price" placeholder="Price" class="admin-input" style="flex: 1;">
                    <input type="number" id="new-stock" placeholder="Stock" class="admin-input" style="flex: 0.8;">
                    <input type="number" id="new-weight" placeholder="Weight (g)" class="admin-input" style="flex: 1;">
                    <button class="edit-btn" onclick="addProduct()" style="background: #22c55e; color: white; border:none; padding: 8px 15px; border-radius: 4px; cursor:pointer;">Add Item</button>
                </div>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th class="col-name">Product Name</th>
                        <th class="col-barcode">Barcode</th>
                        <th>Price (Rs.)</th>
                        <th>Stock</th>
                        <th>Weight (g)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in products %}
                    <tr id="row-{{ p.product_id }}">
                        <td><input type="text" id="name-{{ p.product_id }}" value="{{ p.name }}" class="admin-input name-field" disabled></td>
                        <td><input type="text" id="barcode-{{ p.product_id }}" value="{{ p.barcode }}" class="admin-input barcode-field" disabled></td>
                        <td><input type="number" id="price-{{ p.product_id }}" value="{{ p.unit_price }}" class="admin-input" style="width: 85px;" disabled></td>
                        <td><input type="number" id="stock-{{ p.product_id }}" value="{{ p.stock_quantity }}" class="admin-input" style="width: 65px;" disabled></td>
                        <td><input type="number" id="weight-{{ p.product_id }}" value="{{ p.weight }}" class="admin-input" style="width: 75px;" disabled></td>
                        <td class="action-cell">
                            <button class="edit-btn" id="edit-btn-{{ p.product_id }}" onclick="enableEdit('{{ p.product_id }}')">Edit</button>
                            <button class="edit-btn save-btn" id="save-btn-{{ p.product_id }}" onclick="saveChange('{{ p.product_id }}')">Save</button>
                            <button class="delete-btn" onclick="deleteProduct('{{ p.product_id }}')">Delete</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function enableEdit(id) {
            document.getElementById(`name-${id}`).disabled = false;
            document.getElementById(`barcode-${id}`).disabled = false;
            document.getElementById(`price-${id}`).disabled = false;
            document.getElementById(`stock-${id}`).disabled = false;
            document.getElementById(`weight-${id}`).disabled = false;
            
            document.getElementById(`edit-btn-${id}`).style.display = 'none';
            document.getElementById(`save-btn-${id}`).style.display = 'inline-block';
        }

        async function saveChange(id) {
            const name = document.getElementById(`name-${id}`).value;
            const barcode = document.getElementById(`barcode-${id}`).value;
            const price = document.getElementById(`price-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;
            const weight = document.getElementById(`weight-${id}`).value;

            if (!name || !barcode) return alert("Fields cannot be empty!");
            if (name.trim() === barcode.trim()) return alert("Product name and barcode cannot be the same.");
            
            const response = await fetch('/api/update_product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, name, barcode, price, stock, weight })
            });

            if (response.ok) {
                document.getElementById(`name-${id}`).disabled = true;
                document.getElementById(`barcode-${id}`).disabled = true;
                document.getElementById(`price-${id}`).disabled = true;
                document.getElementById(`stock-${id}`).disabled = true;
                document.getElementById(`weight-${id}`).disabled = true;
                
                document.getElementById(`edit-btn-${id}`).style.display = 'inline-block';
                document.getElementById(`save-btn-${id}`).style.display = 'none';
                alert("Updated!");
            } else {
                const data = await response.json().catch(() => ({}));
                alert(data.message || "Unable to update product.");
            }
        }

        async function addProduct() {
            const name = document.getElementById('new-name').value;
            const barcode = document.getElementById('new-barcode').value;
            const price = document.getElementById('new-price').value;
            const stock = document.getElementById('new-stock').value;
            const weight = document.getElementById('new-weight').value;

            if(!name || !barcode) return alert("Name and Barcode required!");
            if (name.trim() === barcode.trim()) return alert("Product name and barcode cannot be the same.");

            const response = await fetch('/api/add_product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, barcode, price, stock, weight })
            });
            if (response.ok) {
                location.reload();
            } else {
                const data = await response.json().catch(() => ({}));
                alert(data.message || "Unable to add product.");
            }
        }

        async function deleteProduct(id) {
            if (confirm("Delete this product?")) {
                const response = await fetch(`/api/delete_product/${id}`, { method: 'DELETE' });
                if (response.ok) document.getElementById(`row-${id}`).remove();
            }
        }
    </script>
</body>
</html>
