<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Access - Smart Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="app-bg auth-compact-page">
    <div class="app-shell center-content">
        <div class="hero-section">
            <div class="logo-circle">📦</div>
            <h1 class="top-title">Inventory Management</h1>
            <p class="section-subtitle">Manage products, stock, price, and barcode data.</p>
        </div>

        <div class="content">

            {% if login_error %}
            <div class="auth-error">{{ login_error }}</div>
            {% endif %}

            <form class="auth-card" style="margin-bottom: 8px;" method="POST" action="/admin/inventory">
                <label class="auth-label" for="username">Username</label>
                <input class="auth-input" type="text" id="username" name="username" placeholder="Enter username" required>

                <label class="auth-label" for="password">Password</label>
                <input class="auth-input" type="password" id="password" name="password" placeholder="Enter password" required>

                <button class="primary-btn wide-btn" type="submit">Login</button>
            </form>

            <button class="primary-btn wide-btn" type="button" style="background-image: linear-gradient(135deg, #0f766e, #14b8a6); margin-top: 0;" onclick="window.location.href='/admin/change-password'">Change Password</button>

            <p class="auth-note">Default login: Admin / Admin@123</p>
        </div>
    </div>
</body>
</html>
