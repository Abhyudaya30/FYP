<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cashier Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="cashier-container">
    <div class="top-nav">
        <h2 style="margin:0;">Store Monitor</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn-reset-all" onclick="triggerGlobalReset()">Reset All Carts</button>
        </div>
    </div>

    <div id="cart-wrapper" class="cart-grid">
        </div>
</div>

<!-- Page-specific client-side behavior -->
<script>
    // Runs the refresh dashboard routine for this module.
    async function refreshDashboard() {
        try {
            const res = await fetch('/api/all_carts_status');
            // R2 - Auth enforcement UX: redirect to login when staff session is no longer valid.
            if (res.status === 401) {
                window.location.href = '/cashier';
                return;
            }
            const carts = await res.json();
            const wrapper = document.getElementById('cart-wrapper');
            
            let htmlString = "";
            carts.forEach(c => {
                const isActive = (c.status === 'active');
                const awaitingPin = (c.status === 'awaiting_pin');
                const waitingForCashier = isActive && c.checkout_requested;
                const statusLabel = waitingForCashier
                    ? 'Awaiting Cashier'
                    : (isActive ? 'Busy' : (awaitingPin ? 'PIN Issued' : 'Idle'));
                htmlString += `
                    <div class="card ${(isActive || awaitingPin) ? 'active' : ''}">
                        <div class="card-top-row">
                            <div class="cart-title">CART ${c.cart_label}</div>
                            ${c.verification_alert ? '<span class="cashier-alert-icon" title="Unverified item in cart">!</span>' : ''}
                        </div>
                        <span class="status-tag ${(isActive || awaitingPin) ? 'status-active' : 'status-idle'}">
                            ${statusLabel}
                        </span>
                        <div class="price-display">Rs. ${c.total_cost}</div>
                        <!-- R2 - Staff-only code display: shown only after authenticated cashier session check. -->
                        <p style="margin:10px 0 0; color:#444; font-weight:600;">PIN: ${c.display_code || 'WAIT'}</p>
                        
                        ${isActive ? `
                            <button class="btn-main" onclick="window.location.href='/bill/${c.cart_label}'">Open Bill</button>
                            <button class="btn-reset-single" onclick="resetSingleCart('${c.cart_label}')">${waitingForCashier ? 'Approve & End Session' : 'End Session'}</button>
                        ` : '<p style="color:#999; margin-top:20px;">Available for new customer</p>'}
                    </div>
                `;
            });
            wrapper.innerHTML = htmlString;
        } catch (err) { console.error("Update error:", err); }
    }

    // Function to reset just ONE cart
    async function resetSingleCart(label) {
        if(confirm(`End session for Cart ${label}?`)) {
            const res = await fetch(`/api/end_session/${label}`, {
                method: 'POST',
                headers: { 'X-Cashier-Action': 'true' }
            });
            const data = await res.json();
            if(data.status === 'success') {
                refreshDashboard();
            }
        }
    }

    // Function for Global Reset
    async function triggerGlobalReset() {
        if(confirm("Complete ALL active sessions?")) {
            await fetch('/api/reset_everything', {
                method: 'POST',
                headers: { 'X-Cashier-Action': 'true' }
            });
            refreshDashboard();
        }
    }

    setInterval(refreshDashboard, 2000);
    refreshDashboard();
</script>

</body>
</html>
