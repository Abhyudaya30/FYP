<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Smart Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="app-bg">
    <div class="app-shell center-content">
        <div class="hero-section">
            <div class="logo-circle">PW</div>
            <h1 class="top-title">Change Admin Password</h1>
            <p class="section-subtitle">Enter credentials to update your password.</p>
        </div>

        <div class="content">
            <div class="instruction-card" style="text-align: left;">
                New password must include at least 8 characters, one uppercase letter, one number, and one symbol.
            </div>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            {% if success %}
            <div class="auth-success">{{ success }}</div>
            {% endif %}

            <form class="auth-card" method="POST" action="/admin/change-password">
                <label class="auth-label" for="username">Username</label>
                <input class="auth-input" type="text" id="username" name="username" value="{{ auth_username }}" placeholder="Enter username" required>

                <label class="auth-label" for="old_password">Old Password</label>
                <input class="auth-input" type="password" id="old_password" name="old_password" placeholder="Enter old password" required>

                <label class="auth-label" for="new_password">New Password</label>
                <input class="auth-input" type="password" id="new_password" name="new_password" placeholder="Enter new password" required>

                <label class="auth-label" for="confirm_password">Confirm New Password</label>
                <input class="auth-input" type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" required>

                <button class="primary-btn wide-btn" type="submit">Update Password</button>
            </form>

            <button class="primary-btn wide-btn" type="button" style="background-image: linear-gradient(135deg, #0f766e, #14b8a6); margin-top: 0;" onclick="window.history.back()">Back</button>
        </div>
    </div>
</body>
</html>
